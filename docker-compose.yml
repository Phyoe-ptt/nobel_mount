version: '3.8'

services:
  backend:
    build:
      context: ./primary-backend
      dockerfile: Dockerfile
    container_name: noblemount-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod

  ai-api:
    build:
      context: ./ai-api
      dockerfile: Dockerfile
    container_name: noblemount-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: noblemount-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
      - ai-api
